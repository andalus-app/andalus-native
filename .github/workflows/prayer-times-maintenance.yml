name: Prayer Times Maintenance

on:
  workflow_dispatch:

  schedule:
    # Runs at 02:30 UTC on the 3rd day of every month.
    # Sweden local time: 03:30 or 04:30 depending on DST.
    - cron: "30 2 3 * *"

jobs:
  maintain-prayer-times:
    name: Maintain prayer times
    runs-on: ubuntu-latest
    timeout-minutes: 360

    defaults:
      run:
        working-directory: scripts/prayer-import

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALADHAN_BASE_URL: "https://api.aladhan.com/v1/calendar"
      PROFILE_KEY: "aladhan_mwl_shafi_sweden_angle_based"
      REQUEST_SLEEP_SECONDS: "1.5"
      MAX_RETRIES: "4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Maintain rolling prayer time window
        run: |
          python maintain_prayer_window.py --cleanup
